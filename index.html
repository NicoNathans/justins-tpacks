<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin's Texture Packs</title>
    <style>
        /* 1. THE BACKGROUND */
        body {
            margin: 0;
            padding: 0;
            /* Replace the URL below with your actual background image link */
            background: url('https://github.com/NicoNathans/justins-tpacks/blob/main/fQ0tzwF.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            /* Setting the font here applies it to the whole page */
            font-family: "TW Cen MT", "Century Gothic", AppleGothic, sans-serif;
        }

        /* 2. THE TEXT HEADER */
        header {
            width: 100%;
            padding: 60px 0; /* Adds space above and below the text */
            text-align: center;
            background: rgba(0, 0, 0, 0.4); /* Subtle dark tint to make text pop */
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            margin: 0;
            font-size: 4rem; /* Large, bold title */
            letter-spacing: 2px; /* Spaced out letters for a modern look */
            text-transform: uppercase; /* Makes it look like a pro brand */
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.7);
        }

        /* Main Content Area */
        .content {
            max-width: 900px;
            margin: 50px auto;
            padding: 30px;
            background: rgba(0, 0, 0, 0.7); /* Dark box for readability */
            border-radius: 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Justin's Texture Packs</h1>
    </header>

    <div class="content">
        <h2>Latest Releases</h2>
        <p>Welcome! Browse my custom texture packs below.</p>
        </div>

</body>
</html>
