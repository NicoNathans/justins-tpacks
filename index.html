<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin's Texture Packs</title>
    <style>
        /* 1. THE BACKGROUND */
        body {
            margin: 0;
            padding: 0;
            /* Using the raw GitHub link for your image */
            background: url('https://raw.githubusercontent.com/NicoNathans/justins-tpacks/main/fQ0tzwF.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: "TW Cen MT", "Century Gothic", AppleGothic, sans-serif;
        }

        /* 2. THE TEXT HEADER (Smaller) */
        header {
            width: 100%;
            padding: 30px 0; /* Reduced from 60px to 30px */
            text-align: center;
            background: rgba(0, 0, 0, 0.6); /* Slightly darker for a sleeker look */
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem; /* Reduced from 4rem to 2.5rem */
            letter-spacing: 1.5px;
            text-transform: uppercase;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        }

        /* Main Content Area */
        .content {
            max-width: 900px;
            margin: 40px auto;
            padding: 25px;
            background: rgba(0, 0, 0, 0.75);
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px); /* Slightly more blur for style */
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <header>
        <h1>Justin's Texture Packs</h1>
    </header>

    <div class="content">
        <h2>Latest Releases</h2>
        <p>Welcome! Browse my custom texture packs below.</p>
    </div>

</body>
</html>
